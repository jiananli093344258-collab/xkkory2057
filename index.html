<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 下單平台</title>

<style>
body { font-family:sans-serif; background:#fff0f5; padding:10px; margin:0;}
.tab { display:flex; }
.tab button { flex:1; padding:10px; border:none; background:#ffd6e0; }
.tab button.active { background:#ff8fab; color:white; }
.card { background:#fff; padding:10px; border-radius:10px; margin:10px 0;}
.footer { position:fixed; bottom:0; left:0; right:0; background:#fff; padding:10px; display:flex; justify-content:space-between;}
button { background:#ff8fab; color:#fff; border:none; padding:6px; border-radius:6px;}
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:none; padding:20px;}
</style>
</head>

<body>

<h2>💕 下單平台</h2>

<div class="tab">
<button onclick="showTab(0)">穿戴甲</button>
<button onclick="showTab(1)">飾品</button>
<button onclick="showTab(2)">美瞳</button>
</div>

<div id="products"></div>

<div class="footer">
<div>總額: $<span id="total">0</span></div>
<button onclick="openCheckout()">結帳</button>
</div>

<!-- 結帳 -->
<div id="checkout" class="modal">
<h3>填寫資料</h3>
<input id="name" placeholder="姓名"><br><br>
<input id="phone" placeholder="電話"><br><br>
<input id="social" placeholder="IG/LINE"><br><br>

<select id="pay">
<option>貨到付款</option>
<option>轉帳</option>
<option>LinePay</option>
</select><br><br>

<button onclick="submit()">送出訂單</button>
<button onclick="closeModal()">返回</button>
</div>

<!-- 成功 -->
<div id="success" class="modal">
<h2>✅ 已提交訂單</h2>
<textarea id="result"></textarea><br>
<button onclick="copy()">複製</button>
<button onclick="location.reload()">回首頁</button>
</div>

<script>
let cart=[];
let tab=0;

const data=[
[
  {name:"暗黑豹紋波點五角星法式高級感半手工中長款顯白辣妹風穿戴甲",price:149,sizes: ['XS','S','M']},
  {name:"法式愛心春夏可愛狗狗穿戴甲小眾百搭漸變甜酷ins卡通美甲",price:139,sizes: ['XS','S','M']},
  {name:"甜美珍珠圓點貓爪可愛藍絲帶手工杏仁形穿戴甲",price:250,sizes: ['XS','S','M']},
{name:"鑽款",price:300,size:true}
],
[
{name:"耳環",price:100},
{name:"項鍊",price:150}
],
[
{name:"日拋",price:200},
{name:"月拋",price:200}
]
];

function showTab(t){
tab=t;
render();
}

function render(){
let html="";
data[tab].forEach((p,i)=>{
html+=`
<div class="card">
${p.name} $${p.price}<br>
${p.size?`<select id="s${i}"><option>S</option><option>M</option><option>L</option></select>`:""}
<br>
<button onclick="add('${p.name}',${p.price})">加入</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(n,p){
cart.push({n,p});
calc();
}

function calc(){
let total=0;

//穿戴甲4件800
let nails=cart.filter(i=>i.p>=200);
for(let i=0;i<nails.length;i+=4){
let g=nails.slice(i,i+4);
let sum=g.reduce((a,b)=>a+b.p,0);
total+= sum>800?800:sum;
}

//美瞳買3送1
let lens=cart.filter(i=>i.n.includes("拋"));
let free=Math.floor(lens.length/4);
total+= (lens.length-free)*200;

//其他
cart.filter(i=>i.p<200).forEach(i=>total+=i.p);

document.getElementById("total").innerText=total;
}

function openCheckout(){
if(!cart.length) return alert("沒商品");
document.getElementById("checkout").style.display="block";
}

function closeModal(){
document.getElementById("checkout").style.display="none";
}

function submit(){
let name=document.getElementById("name").value;
if(!name) return alert("填姓名");

let total=document.getElementById("total").innerText;

let deposit="";
if(total>500) deposit="⚠️ 請先付訂金\n";

let text=`訂單
姓名:${name}
總額:${total}
${deposit}
商品:
${cart.map(i=>"- "+i.n).join("\n")}

Line:@227agbpg`;

document.getElementById("checkout").style.display="none";
document.getElementById("success").style.display="block";
document.getElementById("result").value=text;
}

function copy(){
document.getElementById("result").select();
document.execCommand("copy");
alert("已複製");
}

render();
</script>

</body>
</html>
